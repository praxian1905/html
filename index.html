<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Responses Navigation</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Source Serif 4', Georgia, serif;
    font-size: 18px;
    padding: 0;
    margin: 0;
    background: #0e0f14;
    color: #e8e9f0;
  }

  a {
    text-decoration: none;
    color: #4fc3f7;
  }

  a:hover {
    color: #f5a623;
    border-bottom: 2px solid #f5a623;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
    text-align: center;
  }

  h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 36px;
    margin: 40px 0 20px;
  }

  nav {
    text-align: left;
  }

  nav ul {
    list-style: none;
    padding: 0;
    margin: 20px 0;
  }

  nav li {
    margin: 15px 0;
    padding: 10px 20px;
    background: #1c1f2b;
    border: 1px solid #2a2e40;
    border-radius: 5px;
    transition: 0.3s;
    cursor: pointer;
  }

  nav li:hover {
    background: #2a2e40;
  }

  .sub-section {
    display: none;
    margin-top: 10px;
    padding-left: 20px;
  }

  .sub-section a {
    display: block;
    margin: 10px 0;
    font-size: 16px;
  }

  .sub-section a:hover {
    text-decoration: none;
    color: #f5a623;
    border-bottom: 2px solid #f5a623;
  }

  nav .expand-icon {
    float: right;
    font-family: 'JetBrains Mono', monospace;
    color: #f5a623;
    cursor: pointer;
  }

  nav .expand-icon:hover {
    color: #4fc3f7;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>HTML Responses</h1>
    <p>Select a topic or sub-section to explore further</p>
    <nav>
      <ul>
        <!-- Sem 6 Project Section -->
        <li>
          Sem 6 Project <span class="expand-icon">+</span>
          <div class="sub-section">
            <a href="./sem6/project/index.html">PCM Sem 6 Project</a>
            <a href="./sem6/project/units.html">Units</a>
            <a href="./sem6/project/research-papers.html">Research Papers</a>
          </div>
        </li>
        <!-- Material Engineering Section -->
        <li>
          Material Engineering <span class="expand-icon">+</span>
          <div class="sub-section">
            <a href="./me_html-responses/chapter1.html">Chapter 1</a>
            <a href="./me_html-responses/chapter2.html">Chapter 2</a>
          </div>
        </li>
        <!-- Strength of Materials Section -->
        <li>
          SOM-2 <span class="expand-icon">+</span>
          <div class="sub-section">
            <a href="./som-2_html-responses/chapter1.html">Chapter 1</a>
            <a href="./som-2_html-responses/chapter2.html">Chapter 2</a>
          </div>
        </li>
        <!-- Add additional sections as needed -->
      </ul>
    </nav>
  </div>

<script>
  // JavaScript to handle dynamic section toggling
  document.querySelectorAll('nav li').forEach(function (section) {
    section.addEventListener('click', function () {
      // Get the sub-section within the clicked section
      const subSection = section.querySelector('.sub-section');
      const expandIcon = section.querySelector('.expand-icon');

      if (subSection.style.display === 'block') {
        // Collapse the sub-section
        subSection.style.display = 'none';
        expandIcon.textContent = '+';
      } else {
        // Expand the sub-section
        subSection.style.display = 'block';
        expandIcon.textContent = '-';
      }
    });
  });
</script>
</body>
</html>
